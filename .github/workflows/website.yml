name: Deploy Website

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: '3.1.50'

      - name: Cache CPM packages
        uses: actions/cache@v4
        with:
          path: .cpm_cache
          key: cpm-wasm-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            cpm-wasm-

      # Cache the bundled GGUF across runs so we don't re-download from HF on
      # every build. Keyed on the URL + filename so a model bump in
      # package.json invalidates the cache automatically.
      - name: Cache bundled GGUF
        uses: actions/cache@v4
        with:
          path: website/public/pet-mad-xs.gguf
          key: gguf-pet-mad-xs-${{ hashFiles('website/package.json') }}

      - name: Build WASM
        run: |
          # --webgpu: ship the WebGPU backend so the website's backend picker
          #           can actually use it on Chrome.
          # --asyncify: JSPI isn't stable on Firefox yet; ASYNCIFY works on
          #             every browser at the cost of ~30% WASM runtime overhead.
          ./scripts/build_wasm.sh --webgpu --asyncify
        env:
          CPM_SOURCE_CACHE: ${{ github.workspace }}/.cpm_cache

      - name: Build mlip.js package
        working-directory: packages/mlip.js
        run: |
          npm install
          node scripts/build.js

      - name: Install website dependencies
        working-directory: website
        run: bun install --frozen-lockfile

      - name: Build website
        working-directory: website
        run: bun run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
