name: Deploy Website

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          # Matches the local dev version that the WebGPU build is known to
          # work with. 3.1.x doesn't ship the emdawnwebgpu port.
          version: '4.0.16'

      - name: Cache CPM packages
        uses: actions/cache@v4
        with:
          path: .cpm_cache
          key: cpm-wasm-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            cpm-wasm-

      - name: Install mlip.js deps
        working-directory: packages/mlip.js
        run: npm install

      # Cache the bundled GGUF across runs so we don't re-download from HF on
      # every build. Keyed on the URL + filename so a model bump in
      # package.json invalidates the cache automatically.
      - name: Cache bundled GGUF
        uses: actions/cache@v4
        with:
          path: website/public/pet-mad-xs.gguf
          key: gguf-pet-mad-xs-${{ hashFiles('website/package.json') }}

      - name: Build WASM (both variants)
        working-directory: packages/mlip.js
        # Two binaries shipped side-by-side:
        #   cpu: no WebGPU, no ASYNCIFY — fast on Firefox/Safari
        #   gpu: WebGPU + ASYNCIFY — Chrome path (ASYNCIFY kills Firefox perf)
        # The loader picks the right variant based on the user's backend choice.
        run: npm run build
        env:
          CPM_SOURCE_CACHE: ${{ github.workspace }}/.cpm_cache

      - name: Install website dependencies
        working-directory: website
        run: bun install --frozen-lockfile

      - name: Build website
        working-directory: website
        run: bun run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
